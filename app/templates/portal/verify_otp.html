{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success"><i class="bi bi-envelope-check"></i> Code Envoyé !</h2>
            <p class="text-muted">Veuillez vérifier votre boîte de réception <strong>{{ email }}</strong>.</p>
        </div>
        <div class="card p-4 shadow-sm border-0">
            <form method="post">
                <div class="mb-4 text-center">
                    <label class="form-label text-muted small fw-bold">CODE À 6 CHIFFRES</label>
                    <input type="text" name="otp_code"
                        class="form-control bg-light border-0 text-center fs-3 fw-bold tracking-widest"
                        placeholder="• • • • • •" required autocomplete="off" maxlength="6" autofocus>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 shadow-sm">Vérifier et me connecter</button>
            </form>
        </div>
        <div class="text-center mt-3 text-muted small">
            Ce code expirera dans 15 minutes.
            <br><a href="{{ url_for('portal.login_otp') }}" class="text-primary text-decoration-none">Renvoyer un
                nouveau code</a>
        </div>
    </div>
</div>
<style>
    .tracking-widest {
        letter-spacing: 0.5em;
    }
</style>
{% endblock %}
